function fmtISO(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;}
function todayISO(){return fmtISO(new Date());}
function addDaysISO(iso,n){const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return fmtISO(d);}
function parseISO(iso){return new Date(iso+'T12:00:00');}
function monthYM(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

function buildDemoSchedules(){
const done=[];
const plan=[{off:-3,n:5},{off:-2,n:8},{off:-1,n:6},{off:0,n:4}];
const pids=['p1','p2','p3','p4'];
let i=0;
plan.forEach(({off,n})=>{
const base=new Date();base.setDate(1);base.setMonth(base.getMonth()+off);
for(let j=0;j<n;j++){
const day=Math.min(4+j*3,26);
done.push({id:'hc'+(++i),date:fmtISO(new Date(base.getFullYear(),base.getMonth(),day)),time:(9+j%6)+':00',player_id:pids[j%4],status:'completed'});
}
});
return[...done,
{id:'s1',date:todayISO(),time:'15:00',player_id:'p1',status:'scheduled'},
{id:'s2',date:todayISO(),time:'17:00',player_id:'p3',status:'scheduled'},
{id:'s3',date:addDaysISO(todayISO(),1),time:'10:00',player_id:'p2',status:'scheduled'},
{id:'s4',date:addDaysISO(todayISO(),3),time:'14:00',player_id:'p4',status:'scheduled'}];
}

{id:'p3',name:'이영희',birth_year:2014,gender:'여성',phone:'010-5555-1234',parent_phone:'',registered_at:'2026-05-10',affiliation:'□□초등부',memo:'주 1회 그룹 레슨 참여.',payment_history:[{date:'2026-05-10',amount:400000,sessions:8}],used_sessions:2},

function calcAge(birthDate,ref=new Date()){
if(!birthDate)return null;
const b=parseISO(birthDate);
const r=ref instanceof Date?ref:parseISO(ref);
let age=r.getFullYear()-b.getFullYear();
const md=(r.getMonth()-b.getMonth())*32+(r.getDate()-b.getDate());
if(md<0)age--;
return age;
}
function getBirthYear(p){
if(p?.birth_year!=null&&p.birth_year!=='')return Number(p.birth_year);
if(p?.birth_date)return parseISO(p.birth_date).getFullYear();
return null;
}
function getAge(p){
const y=getBirthYear(p);
if(y!=null)return new Date().getFullYear()-y;
return p?.age!=null&&p.age!==''?Number(p.age):null;
}
function birthYearOptions(selected){
const now=new Date().getFullYear();
let opts='<option value="">선택</option>';
for(let y=now;y>=now-80;y--)opts+=`<option value="${y}"${String(selected)===String(y)?' selected':''}>${y}년</option>`;
return opts;
}
function migrateState(){
state.players.forEach(p=>{
if(!p.gender)p.gender='남성';
if(!p.birth_year&&p.birth_date)p.birth_year=parseISO(p.birth_date).getFullYear();
if(!p.birth_year&&(p.age!=null&&p.age!==''))p.birth_year=new Date().getFullYear()-Number(p.age);
if(!p.birth_year)p.birth_year=new Date().getFullYear()-14;
if(p.parent_phone==null)p.parent_phone='';
if(!p.registered_at)p.registered_at=firstPaymentDate(p)||todayISO();
delete p.birth_date;
delete p.age;
});
}

function ensureChartSampleData(){
if(firebaseReady&&currentAuthUid)return;
const completed=state.schedules.filter(s=>s.status==='completed').length;
if(completed>=3)return;
buildDemoSchedules().filter(s=>s.status==='completed').forEach(s=>{
if(!state.schedules.some(x=>x.id===s.id))state.schedules.push({...s});
});
}

function upgradeState(raw){
const demo=defaultData();
if(!raw||!Array.isArray(raw.players))return{...demo};
const players=raw.players.map(p=>({
...p,
gender:p.gender||'남성',
birth_year:p.birth_year||(p.birth_date?parseISO(p.birth_date).getFullYear():(p.age!=null?new Date().getFullYear()-Number(p.age):new Date().getFullYear()-14)),
parent_phone:p.parent_phone||'',
registered_at:p.registered_at||firstPaymentDate(p)||todayISO(),
payment_history:p.payment_history||[],
}));
let schedules=Array.isArray(raw.schedules)?[...raw.schedules]:[];
const completedCount=schedules.filter(s=>s.status==='completed').length;
if(completedCount<3){
const keep=schedules.filter(s=>s.status!=='completed');
const demoDone=demo.schedules.filter(s=>s.status==='completed');
schedules=[...keep,...demoDone];
}
if(!schedules.length)schedules=demo.schedules;
return{_version:DATA_VERSION,players,schedules};
}

function isFirebaseEnabled(){
const c=window.FIREBASE_CONFIG;
return !!(c&&c.projectId&&c.apiKey);
}
function initFirebase(){
if(!isFirebaseEnabled()||typeof firebase==='undefined')return false;
if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);

}
function cloudDocRef(uid){return firebase.firestore().doc('users/'+uid+'/app/state');}

function buildAppPayload(){
return{_version:DATA_VERSION,players:state.players,schedules:state.schedules,updatedAt:Date.now()};
}
function buildCloudPayload(user){
const base=buildAppPayload();
return{
...base,
ownerEmail:user?.email||'',
ownerUid:user?.uid||'',
memberCount:state.players.length,
scheduleCount:state.schedules.length
};
}
function applyPayload(parsed){
if(!parsed||!Array.isArray(parsed.players))return false;
state={_version:DATA_VERSION,players:parsed.players,schedules:Array.isArray(parsed.schedules)?parsed.schedules:[]};
migrateState();
ensureChartSampleData();
syncAll();
purgeOrphanSchedules();
return true;
}
function saveStateLocal(payload,authUid){
const ownerUid=authUid||currentAuthUid||null;
const data=payload||buildAppPayload();
const local={_version:data._version,players:data.players,schedules:data.schedules,updatedAt:data.updatedAt||Date.now(),ownerUid:ownerUid||data.ownerUid||''};
try{
if(ownerUid)localStorage.setItem(getStorageKey(ownerUid),JSON.stringify(local));
else localStorage.setItem(STORAGE_KEY_BASE,JSON.stringify(local));
state.players=local.players;
state.schedules=local.schedules;
state._version=DATA_VERSION;
return true;
}catch(e){
console.error(e);
alert('저장에 실패했습니다. 브라우저 저장 공간을 확인해 주세요.');
return false;

}
function updateSyncStatus(mode,detail,subHtml){
const bar=document.getElementById('syncStatusBar');
const dot=document.getElementById('syncDot');
const text=document.getElementById('syncText');
const buildLine=document.getElementById('syncBuildLine');
const subLine=document.getElementById('syncSubLine');
const logout=document.getElementById('syncLogout');
if(!bar||!dot||!text)return;
if(!isFirebaseEnabled()){bar.classList.add('hidden');return;}
bar.classList.remove('hidden');
dot.className='sync-dot';
if(buildLine){
if(mode==='synced'){buildLine.textContent='('+APP_BUILD+')';buildLine.classList.remove('hidden');}
else{buildLine.textContent='';buildLine.classList.add('hidden');}
}
if(subLine){
if(subHtml){subLine.innerHTML=subHtml;subLine.classList.remove('hidden');}
else{subLine.innerHTML='';subLine.classList.add('hidden');}
}
if(mode==='synced'){dot.classList.add('is-synced');text.innerHTML='<strong>클라우드 저장됨</strong>'+(detail?' · '+esc(detail):'');}
else if(mode==='pending'){dot.classList.add('is-pending');text.innerHTML='<strong>저장 중…</strong>';if(subLine){subLine.innerHTML='';subLine.classList.add('hidden');}}
else if(mode==='error'){dot.classList.add('is-error');text.innerHTML='<strong>동기화 실패</strong>'+(detail?' · '+esc(detail):'');if(subLine){subLine.innerHTML='';subLine.classList.add('hidden');}}
else if(mode==='local'){bar.classList.add('hidden');return;}
else{text.textContent=detail||'동기화 준비 중';if(subLine){subLine.innerHTML='';subLine.classList.add('hidden');}}
if(logout)logout.classList.toggle('hidden',mode!=='synced'&&mode!=='pending'&&mode!=='error');
}

updateSyncStatus('synced',email||'',formatSubscriptionBadge(currentSubscription));
}

function createTrialSubscription(){
const trialEndsAt=Date.now()+SAAS_TRIAL_DAYS*86400000;
return{status:'trial',plan:'trial',startedAt:Date.now(),trialEndsAt,expiresAt:trialEndsAt};
}
function isSubscriptionActive(sub){
if(!sub)return false;
const now=Date.now();
if(sub.status==='active'&&(sub.expiresAt||0)>now)return true;
if(sub.status==='trial'&&((sub.trialEndsAt||sub.expiresAt||0)>now))return true;
return false;
}
function getTrialDaysLeft(sub){
if(!sub)return 0;
const end=sub.trialEndsAt||sub.expiresAt||0;
return Math.max(0,Math.ceil((end-Date.now())/86400000));
}
function formatSubscriptionBadge(sub){
if(!sub||!isSubscriptionActive(sub))return'';
if(sub.status==='trial')return'<span class="sync-trial-badge">체험 '+getTrialDaysLeft(sub)+'일 남음</span>';
if(sub.status==='active')return'<span class="sync-trial-badge sync-trial-badge--active">구독 이용 중</span>';
return'';
}
async function loadSubscription(uid){
const ref=cloudProfileRef(uid);
const snap=await ref.get();
const data=snap.exists?snap.data():{};
let sub=data.subscription;
if(!sub){
sub=createTrialSubscription();
await ref.set({subscription:sub,updatedAt:Date.now()},{merge:true});
}
currentSubscription=sub;
return sub;
}
function formatWon(n){return Number(n).toLocaleString('ko-KR')+'원';}
function getTossClientKey(){return(window.TOSS_CLIENT_KEY||'').trim();}
function handleSubscribeCallback(){
const params=new URLSearchParams(window.location.search);
const status=params.get('subscribe');
if(!status)return;
const message=params.get('message');
const paymentKey=params.get('paymentKey');
const orderId=params.get('orderId');
const billingKey=params.get('billingKey');
history.replaceState({},'',window.location.pathname);
if(status==='success'&&paymentKey&&orderId&&billingKey){
finalizeSubscription(paymentKey,orderId,billingKey);
return;
}
if(status==='success')alert('구독이 완료되었습니다.\n잠시 후 앱을 이용할 수 있습니다.');
else alert(message?decodeURIComponent(message):'구독이 완료되지 않았습니다.');
}
async function finalizeSubscription(paymentKey,orderId,billingKey){
const user=firebase.auth().currentUser;
if(!user){
alert('로그인이 필요합니다.\n다시 로그인한 뒤 구독을 진행해 주세요.');
return;
}
try{
const idToken=await user.getIdToken();
const res=await fetch('/api/toss/verify-subscription',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({paymentKey,orderId,billingKey,idToken})
});
const data=await res.json();
if(!res.ok)throw new Error(data.error||'구독 확인 실패');
await firebase.firestore().doc('users/'+user.uid).set({
subscription:data.subscription,
updatedAt:Date.now()
},{merge:true});
alert('구독이 완료되었습니다.\n이제 앱을 이용할 수 있습니다.');
}catch(e){
console.error(e);
alert(e.message||'구독 활성화에 실패했습니다.');
}
}
async function ensureTossPayment(){
const uid=firebase.auth().currentUser?.uid;
if(!uid)throw new Error('로그인이 필요합니다.');
const clientKey=getTossClientKey();
if(!clientKey)throw new Error('토스 클라이언트 키가 설정되지 않았습니다.\ntoss-config.js를 확인해 주세요.');
if(typeof TossPayments==='undefined')throw new Error('토스 결제 SDK를 불러오지 못했습니다.');
if(tossPaymentInstance&&tossPaymentInstance.__uid===uid)return tossPaymentInstance;
const tossPayments=TossPayments(clientKey);
tossPaymentInstance=tossPayments.payment({customerKey:uid});
tossPaymentInstance.__uid=uid;
return tossPaymentInstance;
}
async function startTossSubscribe(){
const user=firebase.auth().currentUser;
if(!user){alert('로그인이 필요합니다.');return;}
try{
const payment=await ensureTossPayment();
await payment.requestBillingAuth({
method:'CARD',
successUrl:window.location.origin+'/api/toss/billing-success',
failUrl:window.location.origin+'/api/toss/billing-fail',
customerEmail:user.email||undefined,
customerName:(user.email||'회원').split('@')[0]
});
}catch(e){
console.error(e);
alert(e.message||'결제창을 열 수 없습니다.');
}
}
function initSubscribeGate(){
const btn=document.getElementById('subscribeBtn');
const priceEl=document.getElementById('subscribePrice');
if(priceEl){
priceEl.textContent='월 '+formatWon(SAAS_SUBSCRIBE_AMOUNT)+' · '+SAAS_SUBSCRIBE_ORDER_NAME;
priceEl.classList.remove('hidden');
}
if(!btn)return;
btn.textContent='구독하기 · 월 '+formatWon(SAAS_SUBSCRIBE_AMOUNT);
btn.onclick=()=>startTossSubscribe();
if(!getTossClientKey()){
btn.classList.add('btn-toss--disabled');
btn.setAttribute('aria-disabled','true');
}
}
function isExpiredTrial(sub){
if(!sub)return false;
if(sub.status==='active'&&(sub.expiresAt||0)>Date.now())return false;
if(sub.trialEndsAt&&sub.trialEndsAt<=Date.now())return true;
return sub.status==='trial'||sub.plan==='trial';
}
function showSubscribeGate(sub){
const gate=document.getElementById('subscribeGate');
const headline=document.getElementById('subscribeTrialHeadline');
const msg=document.getElementById('subscribeMsg');
const trialExpired=isExpiredTrial(sub);
document.body.classList.add('auth-lock');
hideAuthGate();
if(headline){
headline.classList.toggle('hidden',!trialExpired);
if(trialExpired)headline.textContent='체험 '+SAAS_TRIAL_DAYS+'일이 종료되었습니다.';
}
if(msg){
if(trialExpired)msg.textContent='이용을 계속하려면 아래에서 구독해 주세요.';
else msg.textContent='구독 후 다시 로그인해 주세요.';
}
if(gate){gate.classList.remove('hidden');gate.setAttribute('aria-hidden','false');}
}
function hideSubscribeGate(){
const gate=document.getElementById('subscribeGate');
document.body.classList.remove('auth-lock');
if(gate){gate.classList.add('hidden');gate.setAttribute('aria-hidden','true');}
}
function stopProfileListener(){
if(profileUnsub){profileUnsub();profileUnsub=null;}
}
function startProfileListener(uid,sessionId){
stopProfileListener();
profileUnsub=cloudProfileRef(uid).onSnapshot(async snap=>{
if(sessionId!==currentSyncSession||currentAuthUid!==uid)return;
const sub=snap.exists?snap.data()?.subscription:null;
currentSubscription=sub;
if(!firebase.auth().currentUser)return;
if(isSubscriptionActive(sub)){
const gate=document.getElementById('subscribeGate');
if(gate&&!gate.classList.contains('hidden')){
hideSubscribeGate();
await enterAppAsUser(firebase.auth().currentUser,sessionId);
}else{
const detail=firebase.auth().currentUser?.email||'';
renderSyncedStatus(detail);
}
return;
}
showSubscribeGate(sub);
updateSyncStatus('error','구독이 필요합니다');
if(bootFinished)render();
});

async function enterAppAsUser(user,sessionId){

async function syncFromCloud(uid,sessionId){
const ref=cloudDocRef(uid);

if(sessionId!==currentSyncSession||currentAuthUid!==uid)return;
if(snap.exists){
applyPayload(snap.data());

function startCloudListener(uid,sessionId){

cloudUnsub=cloudDocRef(uid).onSnapshot(snap=>{
if(sessionId!==currentSyncSession||currentAuthUid!==uid)return;
if(!snap.exists||applyingRemote)return;
const data=snap.data();
if(!data||!Array.isArray(data.players))return;
if((data.updatedAt||0)<=lastCloudPush)return;
applyingRemote=true;
applyPayload(data);
saveStateLocal(data,uid);
applyingRemote=false;
if(bootFinished)render();
renderSyncedStatus(firebase.auth().currentUser?.email||'');
},e=>console.error(e));
}
async function handleAuthUser(user){

}
currentAuthUid=user.uid;

}

function syncPlayer(p){const h=p.payment_history||[];p.total_paid=h.reduce((s,x)=>s+(x.amount||0),0);p.total_sessions=h.reduce((s,x)=>s+(x.sessions||0),0);p.used_sessions=Math.min(p.used_sessions||0,p.total_sessions);p.remaining_sessions=Math.max(0,p.total_sessions-p.used_sessions);}

const CHART_MAINTAIN='#3182F6';
const CHART_NEW='#0D9B6E';
function memberChartPts(data,max,W,padL,padR,padT,plotH){
const plotW=W-padL-padR;
return data.map((m,i)=>{
const x=padL+(data.length>1?i/(data.length-1):0.5)*plotW;
const y=padT+plotH-(m.count/max)*plotH;
return{x,y,count:m.count};
});
}
function memberChartArea(pts,base){
return pts.length?`M ${pts[0].x} ${pts[0].y} ${pts.slice(1).map(p=>`L ${p.x} ${p.y}`).join(' ')} L ${pts[pts.length-1].x} ${base} L ${pts[0].x} ${base} Z`:'';
}
function memberChartLabelDy(mPt,nPt,plotBottom,padT){
const samePoint=Math.abs(mPt.y-nPt.y)<1.5&&mPt.count===nPt.count;
const nearBottom=mPt.y>plotBottom-10;
const nearTop=mPt.y<padT+16;
let mDy=-12,nDy=16;
if(samePoint){
if(nearBottom){mDy=-28;nDy=-13;}
else if(nearTop){mDy=-14;nDy=18;}
else{mDy=-20;nDy=20;}
}else{
if(nearBottom)nDy=-13;
if(nearTop)mDy=-14;
const gap=(nPt.y+nDy)-(mPt.y+mDy);
if(gap<13){mDy-=5;nDy+=5;}
}
return{m:mDy,n:nDy};
}
function renderMemberTrendChart(active,newly){
const W=300,H=124,padL=12,padR=12,padT=18,padB=10;
const plotH=H-padT-padB;
const plotBottom=padT+plotH;
const max=Math.max(...active.map(m=>m.count),...newly.map(m=>m.count),1);
const mPts=memberChartPts(active,max,W,padL,padR,padT,plotH);
const nPts=memberChartPts(newly,max,W,padL,padR,padT,plotH);
const base=padT+plotH;
const mLine=mPts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
const nLine=nPts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
const dot=(p,i,color,delayBase,dy,labelFill)=>`<circle class="chart-dot" style="transition-delay:${delayBase+i*.07}s" cx="${p.x}" cy="${p.y}" r="4" fill="#fff" stroke="${color}" stroke-width="2.5"/>${p.count?`<text class="chart-dot" style="transition-delay:${delayBase+.05+i*.07}s" x="${p.x}" y="${p.y}" dy="${dy}" text-anchor="middle" dominant-baseline="central" fill="${labelFill}" font-size="10" font-weight="700">${p.count}</text>`:''}`;
return`<svg viewBox="0 0 ${W} ${H}" class="w-full chart-line" aria-hidden="true">
<path class="chart-line-area" d="${memberChartArea(mPts,base)}" fill="${CHART_MAINTAIN}" fill-opacity="0.1"/>
<path class="chart-line-area chart-line-area--new" d="${memberChartArea(nPts,base)}" fill="${CHART_NEW}" fill-opacity="0.12"/>
<polyline class="chart-line-stroke" points="${mLine}" fill="none" stroke="${CHART_MAINTAIN}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<polyline class="chart-line-stroke chart-line-stroke--new" points="${nLine}" fill="none" stroke="${CHART_NEW}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
${mPts.map((p,i)=>{const d=memberChartLabelDy(p,nPts[i],plotBottom,padT);return dot(p,i,CHART_MAINTAIN,.45,d.m,CHART_MAINTAIN);}).join('')}
${nPts.map((p,i)=>{const d=memberChartLabelDy(mPts[i],p,plotBottom,padT);return dot(p,i,CHART_NEW,.58,d.n,CHART_NEW);}).join('')}
</svg>
<div class="flex justify-between mt-1">${active.map(m=>`<span class="text-[11px] text-toss-muted flex-1 text-center">${m.label}</span>`).join('')}</div>`;
}

if(prefersReducedMotion()){el.textContent=fmt(to);return;}
const t0=performance.now();
function frame(now){
const p=Math.min(1,(now-t0)/duration);
const v=Math.round(to*easeOutCubic(p));
el.textContent=fmt(v)+(unit?unit:'');
if(p<1)requestAnimationFrame(frame);
else el.textContent=fmt(to)+(unit?unit:'');
}
requestAnimationFrame(frame);
}
function scheduleDashboardAnimations(){

requestAnimationFrame(()=>requestAnimationFrame(()=>{
if(token!==dashAnimToken||currentView!=='home')return;
runDashboardAnimations();
}));

function runDashboardAnimations(){
const reduced=prefersReducedMotion();
document.querySelectorAll('#statsSection .dash-stat-value[data-count]').forEach((el,i)=>{
const to=+el.dataset.count||0;
const fmt=el.dataset.fmt==='deposit'?(n=>formatDeposit(n)):(n=>String(n));
const unitEl=el.querySelector('.dash-stat-unit');
const unit=unitEl?unitEl.outerHTML:'';
if(reduced){el.innerHTML=fmt(to)+unit;return;}
setTimeout(()=>{
const t0=performance.now();
const dur=850;
function frame(now){
const p=Math.min(1,(now-t0)/dur);
const v=Math.round(to*easeOutCubic(p));
el.innerHTML=fmt(v)+unit;
if(p<1)requestAnimationFrame(frame);
else el.innerHTML=fmt(to)+unit;
}
requestAnimationFrame(frame);
},80+i*70);
});
document.querySelectorAll('.dash-count[data-count],.dash-count-new[data-count]').forEach(el=>{
animateCountEl(el,+el.dataset.count||0,900);
});
document.querySelectorAll('.dash-charts .dash-anim').forEach((el,i)=>{

setTimeout(()=>el.classList.add('is-in'),100+i*90);
});
document.querySelectorAll('.chart-line-stroke').forEach((stroke,i)=>{
if(reduced){stroke.style.strokeDashoffset='0';return;}
const len=stroke.getTotalLength();
stroke.style.strokeDasharray=len;
stroke.style.strokeDashoffset=len;
stroke.getBoundingClientRect();
setTimeout(()=>{stroke.style.strokeDashoffset='0';},i*200);
});
if(reduced){
document.querySelectorAll('.chart-line-area,.chart-dot').forEach(el=>el.classList.add('is-in'));
}else{
document.querySelectorAll('.chart-line-area').forEach((area,i)=>{
setTimeout(()=>area.classList.add('is-in'),300+i*180);
});
setTimeout(()=>document.querySelectorAll('.chart-dot').forEach(d=>d.classList.add('is-in')),480);
}
document.querySelectorAll('.chart-col[data-h]').forEach(el=>{
const h=el.dataset.h;
if(reduced){el.style.height=h+'%';el.style.setProperty('--chart-h',h+'%');return;}
const delay=180+(+el.dataset.i||0)*100;
setTimeout(()=>{el.style.height=h+'%';},delay);
});
document.querySelectorAll('.chart-bar-label').forEach(el=>{
if(reduced){el.classList.add('is-in');return;}
const i=parseFloat(el.dataset.i)||0;
setTimeout(()=>el.classList.add('is-in'),520+i*100);
});
}

function isKrHoliday(date){

const list=KR_HOLIDAYS_BY_YEAR[date.getFullYear()];

function calDays(){
if(calendarMode==='week'){const s=startOfWeek(calendarDate);return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(d.getDate()+i);return{date:d,outside:d.getMonth()!==calendarDate.getMonth()};});}
const y=calendarDate.getFullYear(),m=calendarDate.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),days=[];
for(let i=0;i<first.getDay();i++){const d=new Date(y,m,1-(first.getDay()-i));days.push({date:d,outside:true});}
for(let d=1;d<=last.getDate();d++)days.push({date:new Date(y,m,d),outside:false});
while(days.length<42){const d=new Date(y,m+1,days.length-first.getDay()-last.getDate()+1);days.push({date:d,outside:true});}
return days;
}

setTimeout(()=>{bd.classList.add('hidden');sheet.classList.add('hidden');sheet.innerHTML='';},280);
}
document.getElementById('sheetBackdrop').addEventListener('click',closeSheet);

function genderSegment(current){
const m=(current||'남성')==='남성';
return`<div class="segment-wrap" role="group" aria-label="성별">
<input type="hidden" name="gender" id="genderInput" value="${m?'남성':'여성'}"/>
<button type="button" class="segment-btn ${m?'active':''}" onclick="pickGender(this,'남성')">남성</button>
<button type="button" class="segment-btn ${m?'':'active'}" onclick="pickGender(this,'여성')">여성</button>
</div>`;
}
function pickGender(btn,val){
const wrap=btn.closest('.segment-wrap');
wrap.querySelector('#genderInput').value=val;
wrap.querySelectorAll('.segment-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}
window.pickGender=pickGender;

function renderPlayerForm(id){
const p=id?getPlayer(id):null;
const g=p?.gender||'남성';
const birthYear=getBirthYear(p)||'';
document.getElementById('sheet').innerHTML=`<div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-5"></div>
<h2 class="text-xl font-bold mb-5">${p?'회원 수정':'회원 등록'}</h2>
<form id="playerForm" onsubmit="submitPlayer(event,'${p?.id||''}')" class="space-y-4">
<label class="block"><span class="text-sm text-toss-sub mb-2 block">이름 *</span><input name="name" required class="toss-input" value="${esc(p?.name||'')}" placeholder="홍길동"/></label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">연락처 *</span><input name="phone" required class="toss-input" value="${esc(p?.phone||'')}" placeholder="010-0000-0000"/></label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">학부모 연락처</span><input name="parent_phone" class="toss-input" value="${esc(p?.parent_phone||'')}" placeholder="010-0000-0000"/></label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">성별 *</span>${genderSegment(g)}</label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">출생연도 *</span><select name="birth_year" required class="toss-input">${birthYearOptions(birthYear)}</select><p class="text-xs text-toss-muted mt-1.5">출생연도 기준 나이가 자동으로 계산됩니다</p></label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">소속팀</span><input name="affiliation" class="toss-input" value="${esc(p?.affiliation||'')}" placeholder="학교 / 클럽"/></label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">메모</span><textarea name="memo" class="toss-input toss-textarea" placeholder="포지션, 특이사항, 부상 이력 등">${esc(p?.memo||'')}</textarea></label>
<div class="flex gap-2"><button type="submit" class="btn-toss flex-1">저장</button><button type="button" onclick="closeSheet()" class="btn-toss-ghost flex-1">닫기</button></div>
${p?`<button type="button" onclick="deletePlayer('${p.id}')" class="w-full mt-3 py-3 text-red-500 text-sm">회원 삭제</button>`:''}</form>`;
}

function renderPaymentForm(id){
const p=getPlayer(id);if(!p)return closeSheet();
document.getElementById('sheet').innerHTML=`<div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-5"></div>
<h2 class="text-xl font-bold mb-1">선불 충전</h2><p class="text-toss-sub text-sm mb-5">${esc(p.name)} ${profileBadge(p)} · 잔여 ${p.remaining_sessions}회</p>
<form onsubmit="submitPayment(event,'${p.id}')" class="space-y-4">
<label class="block"><span class="text-sm text-toss-sub mb-2 block">입금일</span><input name="date" type="date" required class="toss-input" value="${todayISO()}"/></label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">입금 금액 (원)</span><input name="amount" type="number" required min="0" step="1000" class="toss-input" placeholder="500000"/></label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">충전 회차</span><input name="sessions" type="number" required min="1" class="toss-input" placeholder="10"/></label>
<button type="submit" class="btn-toss">충전 완료</button></form>`;
}

function renderScheduleForm(arg){
const s=(arg&&typeof arg==='object'&&arg.id)?state.schedules.find(x=>x.id===arg.id):null;
const date=s?.date||(typeof arg==='string'?arg:arg?.date)||todayISO();
const opts=state.players.map(p=>{
const sel=s&&p.id===s.player_id?' selected':'';
return`<option value="${p.id}"${sel}>${esc(p.name)} (${getAge(p)??'?'}세 · 잔여 ${p.remaining_sessions}회)</option>`;
}).join('');
document.getElementById('sheet').innerHTML=`<div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-5"></div>
<h2 class="text-xl font-bold mb-5">${s?'일정 수정':'레슨 예약'}</h2>
<form onsubmit="submitSchedule(event,'${s?.id||''}')" class="space-y-4">
<label class="block"><span class="text-sm text-toss-sub mb-2 block">날짜</span><input name="date" type="date" required class="toss-input" value="${date}"/></label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">시간</span><input name="time" type="time" required class="toss-input" value="${s?.time||'15:00'}"/></label>
<label class="block"><span class="text-sm text-toss-sub mb-2 block">선수</span><select name="player_id" required class="toss-input"><option value="">선택</option>${opts}</select></label>
<div class="flex gap-2"><button type="submit" class="btn-toss flex-1">${s?'저장':'등록'}</button><button type="button" onclick="closeSheet()" class="btn-toss-ghost flex-1">닫기</button></div>
</form>`;
}

function getUsageHistory(pid){
return state.schedules.filter(s=>s.player_id===pid&&s.status==='completed').sort((a,b)=>{
const d=b.date.localeCompare(a.date);
return d!==0?d:b.time.localeCompare(a.time);
});
}
function renderPaymentTimeline(p){
const hist=[...(p.payment_history||[])].sort((a,b)=>b.date.localeCompare(a.date));
if(!hist.length)return'<p class="text-sm text-toss-muted">입금 내역이 없습니다</p>';
return hist.map((h,i)=>`<div class="relative pb-6 ${i===hist.length-1?'pb-0':''}"><span class="absolute -left-6 top-1 w-4 h-4 rounded-full bg-toss-blue border-4 border-white"></span><p class="font-semibold">${fmtFull(h.date)}</p><p class="text-toss-blue font-bold text-lg">${money(h.amount)}</p><p class="text-sm text-toss-sub">${h.sessions}회 충전</p></div>`).join('');
}
function renderUsageTimeline(pid){
const list=getUsageHistory(pid);
if(!list.length)return'<p class="text-sm text-toss-muted">사용 내역이 없습니다</p>';
return list.map((s,i)=>`<div class="relative pb-6 ${i===list.length-1?'pb-0':''}"><span class="absolute -left-6 top-1 w-4 h-4 rounded-full bg-[#00D084] border-4 border-white"></span><p class="font-semibold">${fmtFull(s.date)}</p><p class="text-[#00D084] font-bold text-lg">${s.time}</p><p class="text-sm text-toss-sub">1회 차감 · 레슨 완료</p></div>`).join('');
}
function detailStatCard(active,onclick,label,value,valueClass='text-sm'){
return`<button type="button" onclick="${onclick}" class="rounded-2xl p-3 text-center w-full ${active?'bg-white ring-2 ring-toss-blue shadow-toss':'bg-toss-bg'}"><p class="text-[10px] text-toss-muted mb-1">${label}</p><p class="${valueClass} font-bold">${value}</p></button>`;
}
function setDetailTab(pid,tab){detailTab=tab;renderDetail(pid);}
function renderDetail(id){
const p=getPlayer(id);if(!p)return closeSheet();
const isUsage=detailTab==='usage';
const timeline=isUsage?renderUsageTimeline(p.id):renderPaymentTimeline(p);
document.getElementById('sheet').innerHTML=`<div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-5"></div>
${memberDetailHead(p)}
<div class="grid grid-cols-4 gap-2 mb-5">
${detailStatCard(!isUsage,`setDetailTab('${p.id}','payment')`,'누적 결제',shortMoney(p.total_paid))}
${detailStatCard(!isUsage,`setDetailTab('${p.id}','payment')`,'충전',p.total_sessions+'회')}
${detailStatCard(isUsage,`setDetailTab('${p.id}','usage')`,'사용',p.used_sessions+'회')}
<div class="bg-[#E8F3FF] rounded-2xl p-3 text-center"><p class="text-[10px] text-toss-blue mb-1">잔여</p><p class="text-sm font-bold text-toss-blue">${p.remaining_sessions}회</p></div></div>
${p.memo?`<div class="toss-card bg-toss-bg shadow-none p-4 mb-5"><p class="text-xs text-toss-muted mb-1">메모</p><p class="text-sm whitespace-pre-wrap leading-relaxed">${esc(p.memo)}</p></div>`:''}
<h3 class="font-bold mb-4">${isUsage?'사용 내역':'입금 내역'}</h3>
<div class="relative timeline-line pl-6 mb-6">${timeline}</div>
<button type="button" onclick="openSheet('payment','${p.id}')" class="btn-toss mb-2">선불 충전</button>
<button type="button" onclick="openSheet('player','${p.id}')" class="btn-toss-secondary mb-2">정보 수정</button>
<button type="button" onclick="deletePlayer('${p.id}')" class="w-full mb-2 py-3 rounded-2xl bg-[#FFF0F0] text-red-500 text-sm font-semibold">회원 삭제</button>
<button type="button" onclick="closeSheet()" class="py-3 text-toss-muted text-sm w-full">닫기</button>`;
}

let confirmResolve=null;
function showConfirm(message,opts={}){
return new Promise(resolve=>{
confirmResolve=resolve;
document.getElementById('confirmMsg').textContent=message;
document.getElementById('confirmOk').textContent=opts.ok||'확인';
document.getElementById('confirmCancel').textContent=opts.cancel||'취소';
document.getElementById('confirmBackdrop').classList.add('is-open');
document.getElementById('confirmBackdrop').setAttribute('aria-hidden','false');
document.body.classList.add('confirm-open');
});
}
function closeConfirm(ok){
document.getElementById('confirmBackdrop').classList.remove('is-open');
document.getElementById('confirmBackdrop').setAttribute('aria-hidden','true');
document.body.classList.remove('confirm-open');
if(confirmResolve){const r=confirmResolve;confirmResolve=null;r(!!ok);}
}
async function completeLesson(id){
const s=state.schedules.find(x=>x.id===id);if(!s||s.status!=='scheduled')return;
const p=getPlayer(s.player_id);if(!p)return;
if(p.remaining_sessions<=0){alert('잔여 회차가 없습니다.');openSheet('payment',p.id);return;}
if(!await showConfirm(p.name+'님 레슨을 완료하고 1회 차감할까요?'))return;
p.used_sessions+=1;s.status='completed';saveState();render();
}
async function cancelSchedule(id){
const s=state.schedules.find(x=>x.id===id);
if(!s||s.status!=='scheduled')return;
if(!await showConfirm('이 일정을 취소할까요?'))return;
s.status='canceled';
saveState();
render();
}
async function deletePlayer(id){
if(!id||!await showConfirm('회원과 관련 일정이 삭제됩니다. 계속할까요?'))return;
const pid=String(id);
const playersBefore=state.players.length;
const schedulesBefore=state.schedules.length;
state.players=state.players.filter(p=>String(p.id)!==pid);
state.schedules=state.schedules.filter(s=>String(s.player_id)!==pid);
purgeOrphanSchedules();
if(state.players.length===playersBefore&&state.schedules.length===schedulesBefore)return;
saveState();
closeSheet();
render();
}
function submitPlayer(e,id){
e.preventDefault();
const fd=new FormData(e.target);
const gender=fd.get('gender')||'남성';
const data={
name:fd.get('name').trim(),
phone:phone(fd.get('phone')),
parent_phone:phone(fd.get('parent_phone')||''),
gender,
birth_year:Number(fd.get('birth_year')),
affiliation:(fd.get('affiliation')||'').trim(),
memo:(fd.get('memo')||'').trim()
};
if(id){const p=getPlayer(id);Object.assign(p,data);delete p.birth_date;}
else state.players.push({id:uid('p'),...data,registered_at:todayISO(),payment_history:[],used_sessions:0});
saveState();closeSheet();render();
}
function submitPayment(e,pid){e.preventDefault();const p=getPlayer(pid);if(!p)return;const fd=new FormData(e.target);
if(!p.payment_history)p.payment_history=[];
p.payment_history.push({date:fd.get('date'),amount:Number(fd.get('amount')),sessions:Number(fd.get('sessions'))});
saveState();
render();
detailTab='payment';
renderDetail(pid);
}
function submitSchedule(e,id){
e.preventDefault();
const fd=new FormData(e.target);
const data={date:fd.get('date'),time:String(fd.get('time')).slice(0,5),player_id:fd.get('player_id')};
if(id){
const s=state.schedules.find(x=>x.id===id);
if(!s||s.status!=='scheduled')return;
Object.assign(s,data);
}else{
state.schedules.push({id:uid('s'),...data,status:'scheduled'});
}
selectedDate=data.date;
saveState();closeSheet();setView('calendar');
}

window.setView=setView;window.openSheet=openSheet;window.closeSheet=closeSheet;
window.completeLesson=completeLesson;window.cancelSchedule=cancelSchedule;window.deletePlayer=deletePlayer;
window.submitPlayer=submitPlayer;window.submitPayment=submitPayment;window.submitSchedule=submitSchedule;
window.setCalMode=setCalMode;window.calNav=calNav;window.selectCalDay=selectCalDay;window.setDetailTab=setDetailTab;window.setHistoryMonth=setHistoryMonth;window.navigateHistoryMonth=navigateHistoryMonth;window.openHistoryMonthPicker=openHistoryMonthPicker;window.pickHistoryMonth=pickHistoryMonth;
window.firebaseLogout=firebaseLogout;

document.getElementById('authLogin')?.addEventListener('click',firebaseLogin);
document.getElementById('authRegister')?.addEventListener('click',firebaseRegister);
document.getElementById('syncLogout')?.addEventListener('click',firebaseLogout);
document.getElementById('subscribeLogout')?.addEventListener('click',firebaseLogout);
initSubscribeGate();
document.getElementById('authPassword')?.addEventListener('keydown',e=>{if(e.key==='Enter')firebaseLogin();});

document.getElementById('confirmCancel').onclick=()=>closeConfirm(false);
document.getElementById('confirmOk').onclick=()=>closeConfirm(true);
document.getElementById('confirmBackdrop').onclick=e=>{if(e.target.id==='confirmBackdrop')closeConfirm(false);};
document.getElementById('confirmDialog').onclick=e=>e.stopPropagation();

function hideAppSplash(){
const el=document.getElementById('appSplash');
if(!el)return;
el.classList.add('is-hidden');
el.setAttribute('aria-hidden','true');
document.body.classList.remove('app-boot');
setTimeout(()=>el.remove(),450);
}
function finishBootUI(){
selectedDate=selectedDate||todayISO();
setView('home');
bootFinished=true;
}

function bootApp(){
handleSubscribeCallback();
if(initFirebase()){
resetAppState();
showAuthGate();
firebase.auth().onAuthStateChanged(handleAuthUser);
}else{
loadState();
updateSyncStatus('local');
}
finishBootUI();
const splashStarted=performance.now();
setTimeout(hideAppSplash,Math.max(0,650-(performance.now()-splashStarted)));
}

bootApp();
</script>
