.dash-hero-body{padding:6px 16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:0}

.dash-stat:nth-child(odd){padding-right:10px}
.dash-stat:nth-child(even){padding-left:10px;border-left:1px solid #F2F4F6}

.dash-stat-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#F2F4F6;color:#4E5968}
.dash-stat-icon svg{width:18px;height:18px}

.dash-stat-icon--lessons{background:#E6FAF3;color:#0D7A5F}
.dash-stat-icon--deposit{background:#FFF4E6;color:#E65100}
.dash-stat-label{font-size:11px;font-weight:500;color:#8B95A1;line-height:1.3}
.dash-stat-value{font-size:1.35rem;font-weight:700;color:#191F28;line-height:1.2;letter-spacing:-.03em}

.app-splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F2F4F6;padding:max(24px,env(safe-area-inset-top)) 28px 24px;text-align:center;transition:opacity .4s ease,visibility .4s}

body.app-boot #app{opacity:0}
body.app-boot .bottom-nav,body.app-boot #fab{opacity:0}
</style>

<script>
const STORAGE_KEY='soccer-lesson-app-v4';
const DATA_VERSION=4;
const uid=p=>p+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const WEEKDAYS=['일','월','화','수','목','금','토'];
let state={players:[],schedules:[]};
let currentView='home',calendarMode='month',calendarDate=new Date(),selectedDate=null,detailTab='payment';

function fmtISO(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;}
function todayISO(){return fmtISO(new Date());}
function addDaysISO(iso,n){const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return fmtISO(d);}
function parseISO(iso){return new Date(iso+'T12:00:00');}
function monthYM(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

function buildDemoSchedules(){
const done=[];
const plan=[{off:-3,n:5},{off:-2,n:8},{off:-1,n:6},{off:0,n:4}];
const pids=['p1','p2','p3','p4'];
let i=0;
plan.forEach(({off,n})=>{
const base=new Date();base.setDate(1);base.setMonth(base.getMonth()+off);
for(let j=0;j<n;j++){
const day=Math.min(4+j*3,26);
done.push({id:'hc'+(++i),date:fmtISO(new Date(base.getFullYear(),base.getMonth(),day)),time:(9+j%6)+':00',player_id:pids[j%4],status:'completed'});
}
});
return[...done,
{id:'s1',date:todayISO(),time:'15:00',player_id:'p1',status:'scheduled'},
{id:'s2',date:todayISO(),time:'17:00',player_id:'p3',status:'scheduled'},
{id:'s3',date:addDaysISO(todayISO(),1),time:'10:00',player_id:'p2',status:'scheduled'},
{id:'s4',date:addDaysISO(todayISO(),3),time:'14:00',player_id:'p4',status:'scheduled'}];
}

const defaultData=()=>({
_version:DATA_VERSION,
players:[
{id:'p1',name:'홍길동',birth_year:2012,gender:'남성',phone:'010-1234-5678',parent_phone:'',affiliation:'○○중 FC',memo:'골키퍼 집중.\n발 구석 잡기 연습 중. 무릎 주의.',payment_history:[{date:'2026-03-01',amount:500000,sessions:10},{date:'2026-05-01',amount:250000,sessions:5}],used_sessions:8},
{id:'p2',name:'김철수',birth_year:2009,gender:'남성',phone:'010-9876-5432',parent_phone:'',affiliation:'△△고등학교',memo:'필드 플레이어. 스피드·패스 위주.',payment_history:[{date:'2026-04-10',amount:600000,sessions:12}],used_sessions:11},
{id:'p3',name:'이영희',birth_year:2014,gender:'여성',phone:'010-5555-1234',parent_phone:'',affiliation:'□□초등부',memo:'주 1회 그룹 레슨 참여.',payment_history:[{date:'2026-05-10',amount:400000,sessions:8}],used_sessions:2},
{id:'p4',name:'박민수',birth_year:2002,gender:'남성',phone:'010-2222-8888',parent_phone:'',affiliation:'개인 레슨',memo:'성인 취미반. 체력·기술 병행.',payment_history:[{date:'2026-02-15',amount:450000,sessions:10}],used_sessions:4}
],
schedules:buildDemoSchedules()
});

function calcAge(birthDate,ref=new Date()){
if(!birthDate)return null;
const b=parseISO(birthDate);
const r=ref instanceof Date?ref:parseISO(ref);
let age=r.getFullYear()-b.getFullYear();
const md=(r.getMonth()-b.getMonth())*32+(r.getDate()-b.getDate());
if(md<0)age--;
return age;
}
function getBirthYear(p){
if(p?.birth_year!=null&&p.birth_year!=='')return Number(p.birth_year);
if(p?.birth_date)return parseISO(p.birth_date).getFullYear();
return null;
}
function getAge(p){
const y=getBirthYear(p);
if(y!=null)return new Date().getFullYear()-y;
return p?.age!=null&&p.age!==''?Number(p.age):null;
}
function birthYearOptions(selected){
const now=new Date().getFullYear();
let opts='<option value="">선택</option>';
for(let y=now;y>=now-80;y--)opts+=`<option value="${y}"${String(selected)===String(y)?' selected':''}>${y}년</option>`;
return opts;
}
function migrateState(){
state.players.forEach(p=>{
if(!p.gender)p.gender='남성';
if(!p.birth_year&&p.birth_date)p.birth_year=parseISO(p.birth_date).getFullYear();
if(!p.birth_year&&(p.age!=null&&p.age!==''))p.birth_year=new Date().getFullYear()-Number(p.age);
if(!p.birth_year)p.birth_year=new Date().getFullYear()-14;
if(p.parent_phone==null)p.parent_phone='';
delete p.birth_date;
delete p.age;
});
}

function ensureChartSampleData(){
const completed=state.schedules.filter(s=>s.status==='completed').length;
if(completed>=3)return;
buildDemoSchedules().filter(s=>s.status==='completed').forEach(s=>{
if(!state.schedules.some(x=>x.id===s.id))state.schedules.push({...s});
});
}

function upgradeState(raw){
const demo=defaultData();
if(!raw||!Array.isArray(raw.players))return{...demo};
const players=raw.players.map(p=>({
...p,
gender:p.gender||'남성',
birth_year:p.birth_year||(p.birth_date?parseISO(p.birth_date).getFullYear():(p.age!=null?new Date().getFullYear()-Number(p.age):new Date().getFullYear()-14)),
parent_phone:p.parent_phone||'',
payment_history:p.payment_history||[],
}));
let schedules=Array.isArray(raw.schedules)?[...raw.schedules]:[];
const completedCount=schedules.filter(s=>s.status==='completed').length;
if(completedCount<3){
const keep=schedules.filter(s=>s.status!=='completed');
const demoDone=demo.schedules.filter(s=>s.status==='completed');
schedules=[...keep,...demoDone];
}
if(!schedules.length)schedules=demo.schedules;
return{_version:DATA_VERSION,players,schedules};
}

function loadState(){
let shouldSave=false;
try{
let raw=localStorage.getItem(STORAGE_KEY);
if(!raw)raw=localStorage.getItem('soccer-lesson-app-v3')||localStorage.getItem('soccer-lesson-app-v2');
if(raw){
const parsed=JSON.parse(raw);
if(parsed._version===DATA_VERSION&&Array.isArray(parsed.players)){
state={_version:DATA_VERSION,players:parsed.players,schedules:Array.isArray(parsed.schedules)?parsed.schedules:[]};
migrateState();
ensureChartSampleData();
}else{
state=upgradeState(parsed);
shouldSave=true;
}
}else{
state=defaultData();
shouldSave=true;
}
}catch{
state=defaultData();
shouldSave=true;
}
syncAll();
if(purgeOrphanSchedules())shouldSave=true;
if(shouldSave)saveState();
}
function saveState(){
syncAll();
purgeOrphanSchedules();
const payload={_version:DATA_VERSION,players:state.players,schedules:state.schedules};
try{
localStorage.setItem(STORAGE_KEY,JSON.stringify(payload));
state.players=payload.players;
state.schedules=payload.schedules;
state._version=DATA_VERSION;
}catch(e){
console.error(e);
alert('저장에 실패했습니다. 브라우저 저장 공간을 확인해 주세요.');
}
}
function syncAll(){state.players.forEach(syncPlayer);}
function syncPlayer(p){const h=p.payment_history||[];p.total_paid=h.reduce((s,x)=>s+(x.amount||0),0);p.total_sessions=h.reduce((s,x)=>s+(x.sessions||0),0);p.used_sessions=Math.min(p.used_sessions||0,p.total_sessions);p.remaining_sessions=Math.max(0,p.total_sessions-p.used_sessions);}
function getPlayer(id){if(id==null||id==='')return null;return state.players.find(p=>String(p.id)===String(id));}
function purgeOrphanSchedules(){
const ids=new Set(state.players.map(p=>String(p.id)));
const before=state.schedules.length;
state.schedules=state.schedules.filter(s=>s.player_id!=null&&s.player_id!==''&&ids.has(String(s.player_id)));
return before!==state.schedules.length;
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function money(n){return new Intl.NumberFormat('ko-KR').format(n)+'원';}
function shortMoney(n){if(n>=10000)return Math.round(n/10000)+'만';if(n>=1000)return Math.round(n/1000)+'천';return String(n);}
function phone(v){const d=String(v).replace(/\D/g,'');if(d.length<=3)return d;if(d.length<=7)return d.slice(0,3)+'-'+d.slice(3);return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7,11);}
function fmtShort(iso){const[,m,d]=iso.split('-');return Number(m)+'월 '+Number(d)+'일';}
function fmtFull(iso){const[y,m,d]=iso.split('-');return y+'.'+m+'.'+d;}
function isThisMonth(iso){const d=parseISO(iso),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}
function isLow(p){return p.total_sessions>0&&p.remaining_sessions<=2;}
function formatDisplayDate(d=new Date()){return`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;}
function formatClockTime(d=new Date()){
const h=d.getHours(),m=d.getMinutes(),ap=h<12?'오전':'오후',h12=h%12||12;
return`${ap} ${h12}:${String(m).padStart(2,'0')}`;
}

return{registered,lessonMembers,totalLessons,totalDeposits};
}
function getMonthStats(){const deposits=state.players.reduce((s,p)=>s+(p.payment_history||[]).filter(h=>isThisMonth(h.date)).reduce((a,h)=>a+h.amount,0),0);const deductions=state.schedules.filter(s=>s.status==='completed'&&isThisMonth(s.date)).length;return{deposits,deductions};}
function onDate(iso){return state.schedules.filter(s=>s.date===iso&&s.status!=='canceled').sort((a,b)=>a.time.localeCompare(b.time));}
function badge(p){return isLow(p)?'<span class="text-[11px] font-bold px-2 py-0.5 rounded-full bg-[#FFF0E0] text-[#E65100]">재결제 필요</span>':'';}

function endOfMonthISO(ym){
const[y,m]=ym.split('-').map(Number);
return fmtISO(new Date(y,m,0));
}
function snapshotDateForMonth(ym){
return ym===monthYM(new Date())?todayISO():endOfMonthISO(ym);
}
function remainingAtDate(p,endIso){
const charged=(p.payment_history||[]).filter(h=>h.date<=endIso).reduce((s,x)=>s+(x.sessions||0),0);
if(!charged)return 0;
const used=state.schedules.filter(s=>s.player_id===p.id&&s.status==='completed'&&s.date<=endIso).length;
return Math.max(0,charged-used);
}
function isMaintainedInMonth(p,ym){
const end=snapshotDateForMonth(ym);
const first=(p.payment_history||[]).map(h=>h.date).filter(Boolean).sort()[0];
if(!first||first>end)return false;
return remainingAtDate(p,end)>0;
}
function getMonthlyActiveMembers(){
return getLastMonths(6).map(m=>({...m,count:state.players.filter(p=>isMaintainedInMonth(p,m.ym)).length}));
}
function firstPaymentDate(p){
const d=(p.payment_history||[]).map(h=>h.date).filter(Boolean).sort();
return d[0]||null;
}
function isNewRegistrationInMonth(p,ym){
const first=firstPaymentDate(p);
return !!(first&&first.slice(0,7)===ym);
}
function getMonthlyNewMembers(){
return getLastMonths(6).map(m=>({...m,count:state.players.filter(p=>isNewRegistrationInMonth(p,m.ym)).length}));
}
function getLastMonths(n){
const arr=[];
const now=new Date();
for(let i=n-1;i>=0;i--){
const d=new Date(now.getFullYear(),now.getMonth()-i,1);
arr.push({ym:monthYM(d),label:(d.getMonth()+1)+'월',shortLabel:String(d.getMonth()+1)});
}
return arr;
}
function getMonthlyLessons(){
return getLastMonths(4).map(m=>({
...m,
count:state.schedules.filter(s=>s.status==='completed'&&s.date.slice(0,7)===m.ym).length
}));
}

const CHART_MAINTAIN='#3182F6';
const CHART_NEW='#0D9B6E';
function memberChartPts(data,max,W,padL,padR,padT,plotH){
const plotW=W-padL-padR;
return data.map((m,i)=>{
const x=padL+(data.length>1?i/(data.length-1):0.5)*plotW;
const y=padT+plotH-(m.count/max)*plotH;
return{x,y,count:m.count};
});
}
function memberChartArea(pts,base){
return pts.length?`M ${pts[0].x} ${pts[0].y} ${pts.slice(1).map(p=>`L ${p.x} ${p.y}`).join(' ')} L ${pts[pts.length-1].x} ${base} L ${pts[0].x} ${base} Z`:'';
}
function renderMemberTrendChart(active,newly){
const W=300,H=148,padL=16,padR=16,padT=22,padB=14;
const plotH=H-padT-padB;
const max=Math.max(...active.map(m=>m.count),...newly.map(m=>m.count),1);
const mPts=memberChartPts(active,max,W,padL,padR,padT,plotH);
const nPts=memberChartPts(newly,max,W,padL,padR,padT,plotH);
const base=padT+plotH;
const mLine=mPts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
const nLine=nPts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
const dot=(p,i,color,delayBase,labelY,labelFill)=>`<circle class="chart-dot" style="transition-delay:${delayBase+i*.07}s" cx="${p.x}" cy="${p.y}" r="4" fill="#fff" stroke="${color}" stroke-width="2.5"/><text class="chart-dot" style="transition-delay:${delayBase+.05+i*.07}s" x="${p.x}" y="${labelY}" text-anchor="middle" fill="${labelFill}" font-size="10" font-weight="700">${p.count}</text>`;
return`<svg viewBox="0 0 ${W} ${H}" class="w-full chart-line" aria-hidden="true">
<path class="chart-line-area" d="${memberChartArea(mPts,base)}" fill="${CHART_MAINTAIN}" fill-opacity="0.1"/>
<path class="chart-line-area chart-line-area--new" d="${memberChartArea(nPts,base)}" fill="${CHART_NEW}" fill-opacity="0.12"/>
<polyline class="chart-line-stroke" points="${mLine}" fill="none" stroke="${CHART_MAINTAIN}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<polyline class="chart-line-stroke chart-line-stroke--new" points="${nLine}" fill="none" stroke="${CHART_NEW}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
${mPts.map((p,i)=>dot(p,i,CHART_MAINTAIN,.45,Math.max(p.y-9,11),CHART_MAINTAIN)).join('')}
${nPts.map((p,i)=>dot(p,i,CHART_NEW,.58,Math.min(p.y+16,H-4),CHART_NEW)).join('')}
</svg>
<div class="flex justify-between mt-2 px-1">${active.map(m=>`<span class="text-[11px] text-toss-muted flex-1 text-center">${m.label}</span>`).join('')}</div>`;
}

let dashAnimToken=0;
const prefersReducedMotion=()=>window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function easeOutCubic(t){return 1-Math.pow(1-t,3);}
function animateCountEl(el,to,duration,formatter){
const unit=el.dataset.unit||'';
const fmt=formatter||(n=>String(n));
if(prefersReducedMotion()){el.textContent=fmt(to);return;}
const t0=performance.now();
function frame(now){
const p=Math.min(1,(now-t0)/duration);
const v=Math.round(to*easeOutCubic(p));
el.textContent=fmt(v)+(unit?unit:'');
if(p<1)requestAnimationFrame(frame);
else el.textContent=fmt(to)+(unit?unit:'');
}
requestAnimationFrame(frame);
}
function scheduleDashboardAnimations(){
const token=++dashAnimToken;
requestAnimationFrame(()=>requestAnimationFrame(()=>{
if(token!==dashAnimToken||currentView!=='home')return;
runDashboardAnimations();
}));
}
function runDashboardAnimations(){
const reduced=prefersReducedMotion();
document.querySelectorAll('#statsSection .dash-stat-value[data-count]').forEach((el,i)=>{
const to=+el.dataset.count||0;
const fmt=el.dataset.fmt==='deposit'?(n=>formatDeposit(n)):(n=>String(n));
const unitEl=el.querySelector('.dash-stat-unit');
const unit=unitEl?unitEl.outerHTML:'';
if(reduced){el.innerHTML=fmt(to)+unit;return;}
setTimeout(()=>{
const t0=performance.now();
const dur=850;
function frame(now){
const p=Math.min(1,(now-t0)/dur);
const v=Math.round(to*easeOutCubic(p));
el.innerHTML=fmt(v)+unit;
if(p<1)requestAnimationFrame(frame);
else el.innerHTML=fmt(to)+unit;
}
requestAnimationFrame(frame);
},80+i*70);
});
document.querySelectorAll('.dash-count[data-count],.dash-count-new[data-count]').forEach(el=>{
animateCountEl(el,+el.dataset.count||0,900);
});
document.querySelectorAll('.dash-charts .dash-anim').forEach((el,i)=>{
if(reduced){el.classList.add('is-in');return;}
setTimeout(()=>el.classList.add('is-in'),100+i*90);
});
document.querySelectorAll('.chart-line-stroke').forEach((stroke,i)=>{
if(reduced){stroke.style.strokeDashoffset='0';return;}
const len=stroke.getTotalLength();
stroke.style.strokeDasharray=len;
stroke.style.strokeDashoffset=len;
stroke.getBoundingClientRect();
setTimeout(()=>{stroke.style.strokeDashoffset='0';},i*200);
});
if(reduced){
document.querySelectorAll('.chart-line-area,.chart-dot').forEach(el=>el.classList.add('is-in'));
}else{
document.querySelectorAll('.chart-line-area').forEach((area,i)=>{
setTimeout(()=>area.classList.add('is-in'),300+i*180);
});
setTimeout(()=>document.querySelectorAll('.chart-dot').forEach(d=>d.classList.add('is-in')),480);
}
document.querySelectorAll('.chart-col[data-h]').forEach(el=>{
const h=el.dataset.h;
if(reduced){el.style.height=h+'%';el.style.setProperty('--chart-h',h+'%');return;}
const delay=180+(+el.dataset.i||0)*100;
setTimeout(()=>{el.style.height=h+'%';},delay);
});
document.querySelectorAll('.chart-bar-label').forEach(el=>{
if(reduced){el.classList.add('is-in');return;}
const i=parseFloat(el.dataset.i)||0;
setTimeout(()=>el.classList.add('is-in'),520+i*100);
});
}

function startOfWeek(d){const s=new Date(d);s.setDate(s.getDate()-s.getDay());return s;}
function weekLabel(d){const s=startOfWeek(d),e=new Date(s);e.setDate(e.getDate()+6);return(s.getMonth()+1)+'/'+s.getDate()+' – '+(e.getMonth()+1)+'/'+e.getDate();}

function renderCalendar(){
const y=calendarDate.getFullYear(),m=calendarDate.getMonth();
const title=calendarMode==='month'?y+'년 '+(m+1)+'월':weekLabel(calendarDate);
document.getElementById('view-calendar').innerHTML=`
<div class="toss-card p-4"><div class="flex items-center justify-between mb-4">
<button type="button" onclick="calNav(-1)" class="w-10 h-10 rounded-full bg-toss-bg font-bold text-toss-sub">‹</button>
<div class="text-center"><p class="font-bold text-lg">${title}</p>
<div class="flex gap-1 mt-2 justify-center">
<button type="button" onclick="setCalMode('month')" class="px-3 py-1 rounded-full text-xs font-semibold ${calendarMode==='month'?'bg-toss-blue text-white':'bg-toss-bg text-toss-sub'}">월</button>
<button type="button" onclick="setCalMode('week')" class="px-3 py-1 rounded-full text-xs font-semibold ${calendarMode==='week'?'bg-toss-blue text-white':'bg-toss-bg text-toss-sub'}">주</button></div></div>
<button type="button" onclick="calNav(1)" class="w-10 h-10 rounded-full bg-toss-bg font-bold text-toss-sub">›</button></div>
<div class="grid grid-cols-7 gap-1 mb-1">${WEEKDAYS.map((d,i)=>`<div class="text-center text-xs font-medium py-1 ${i===0?'text-red-500':i===6?'text-toss-blue':'text-toss-muted'}">${d}</div>`).join('')}</div>
<div id="calGrid" class="grid grid-cols-7 gap-1"></div></div>
<div id="dayPanel" class="mt-4"></div>`;
renderCalGrid();renderDayPanel(selectedDate||todayISO());
}

function setCalMode(mode){calendarMode=mode;renderCalendar();}
function calNav(dir){if(calendarMode==='month')calendarDate.setMonth(calendarDate.getMonth()+dir);else calendarDate.setDate(calendarDate.getDate()+dir*7);renderCalendar();}

function calDays(){
if(calendarMode==='week'){const s=startOfWeek(calendarDate);return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(d.getDate()+i);return{date:d,outside:d.getMonth()!==calendarDate.getMonth()};});}
const y=calendarDate.getFullYear(),m=calendarDate.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),days=[];
for(let i=0;i<first.getDay();i++){const d=new Date(y,m,1-(first.getDay()-i));days.push({date:d,outside:true});}
for(let d=1;d<=last.getDate();d++)days.push({date:new Date(y,m,d),outside:false});
while(days.length<42){const d=new Date(y,m+1,days.length-first.getDay()-last.getDate()+1);days.push({date:d,outside:true});}
return days;
}

function calEventLabel(name){
const n=(name||'?').trim();
return n.length<=3?n:n.slice(0,3);
}
function renderCalGrid(){
const today=todayISO();
document.getElementById('calGrid').innerHTML=calDays().map(({date,outside})=>{
const iso=fmtISO(date),scheds=onDate(iso).filter(s=>s.status!=='canceled'),sel=selectedDate===iso,isT=today===iso;
const tags=scheds.slice(0,2).map(s=>{const p=getPlayer(s.player_id),done=s.status==='completed';
return`<span class="cal-event ${done?'bg-gray-200 text-toss-muted':'bg-[#E8F3FF] text-toss-blue'}" title="${esc(p?.name||'')}">${esc(calEventLabel(p?.name))}</span>`;}).join('');
const more=scheds.length>2?`<span class="cal-event-more">+${scheds.length-2}명</span>`:'';
return`<button type="button" onclick="selectCalDay('${iso}')" class="cal-day w-full text-left ${sel?'selected ring-2 ring-toss-blue':''} ${outside?'opacity-40':''} hover:bg-toss-bg">
<div class="cal-day-top"><span class="cal-num ${isT?'today':''}">${date.getDate()}</span></div>
<div class="cal-day-events">${tags}${more}</div></button>`;}).join('');
}

function selectCalDay(iso){selectedDate=iso;renderCalGrid();renderDayPanel(iso);}

function renderDayPanel(iso){
const scheds=onDate(iso),el=document.getElementById('dayPanel');
if(!el)return;
el.innerHTML=`<div class="flex justify-between mb-3"><h3 class="font-bold text-lg">${fmtShort(iso)} 일정</h3>

function dayCard(s){

function openSheet(type,arg){
if(type==='player')renderPlayerForm(arg);
else if(type==='payment')renderPaymentForm(arg);
else if(type==='schedule')renderScheduleForm(arg);
else if(type==='detail'){detailTab='payment';renderDetail(arg);}
const sheet=document.getElementById('sheet'),bd=document.getElementById('sheetBackdrop');
bd.classList.remove('hidden');sheet.classList.remove('hidden');
document.body.classList.add('sheet-open');
requestAnimationFrame(()=>{bd.classList.add('is-open');sheet.classList.add('is-open');});
}
function closeSheet(){
const sheet=document.getElementById('sheet'),bd=document.getElementById('sheetBackdrop');
bd.classList.remove('is-open');sheet.classList.remove('is-open');
document.body.classList.remove('sheet-open');
setTimeout(()=>{bd.classList.add('hidden');sheet.classList.add('hidden');sheet.innerHTML='';},280);
}
document.getElementById('sheetBackdrop').addEventListener('click',closeSheet);

function getUsageHistory(pid){
return state.schedules.filter(s=>s.player_id===pid&&s.status==='completed').sort((a,b)=>{
const d=b.date.localeCompare(a.date);
return d!==0?d:b.time.localeCompare(a.time);
});
}
function renderPaymentTimeline(p){
const hist=[...(p.payment_history||[])].sort((a,b)=>b.date.localeCompare(a.date));
if(!hist.length)return'<p class="text-sm text-toss-muted">입금 내역이 없습니다</p>';
return hist.map((h,i)=>`<div class="relative pb-6 ${i===hist.length-1?'pb-0':''}"><span class="absolute -left-6 top-1 w-4 h-4 rounded-full bg-toss-blue border-4 border-white"></span><p class="font-semibold">${fmtFull(h.date)}</p><p class="text-toss-blue font-bold text-lg">${money(h.amount)}</p><p class="text-sm text-toss-sub">${h.sessions}회 충전</p></div>`).join('');
}
function renderUsageTimeline(pid){
const list=getUsageHistory(pid);
if(!list.length)return'<p class="text-sm text-toss-muted">사용 내역이 없습니다</p>';

let confirmResolve=null;
function showConfirm(message,opts={}){
return new Promise(resolve=>{
confirmResolve=resolve;
document.getElementById('confirmMsg').textContent=message;
document.getElementById('confirmOk').textContent=opts.ok||'확인';
document.getElementById('confirmCancel').textContent=opts.cancel||'취소';
document.getElementById('confirmBackdrop').classList.add('is-open');
document.getElementById('confirmBackdrop').setAttribute('aria-hidden','false');
document.body.classList.add('confirm-open');
});
}
function closeConfirm(ok){
document.getElementById('confirmBackdrop').classList.remove('is-open');
document.getElementById('confirmBackdrop').setAttribute('aria-hidden','true');
document.body.classList.remove('confirm-open');
if(confirmResolve){const r=confirmResolve;confirmResolve=null;r(!!ok);}
}
async function completeLesson(id){
const s=state.schedules.find(x=>x.id===id);if(!s||s.status!=='scheduled')return;
const p=getPlayer(s.player_id);if(!p)return;
if(p.remaining_sessions<=0){alert('잔여 회차가 없습니다.');openSheet('payment',p.id);return;}
if(!await showConfirm(p.name+'님 레슨을 완료하고 1회 차감할까요?'))return;
p.used_sessions+=1;s.status='completed';saveState();render();
}
async function cancelSchedule(id){
const s=state.schedules.find(x=>x.id===id);
if(!s||s.status!=='scheduled')return;
if(!await showConfirm('이 일정을 취소할까요?'))return;
s.status='canceled';
saveState();
render();
}
async function deletePlayer(id){
if(!id||!await showConfirm('회원과 관련 일정이 삭제됩니다. 계속할까요?'))return;
const pid=String(id);
const playersBefore=state.players.length;
const schedulesBefore=state.schedules.length;
state.players=state.players.filter(p=>String(p.id)!==pid);
state.schedules=state.schedules.filter(s=>String(s.player_id)!==pid);
purgeOrphanSchedules();
if(state.players.length===playersBefore&&state.schedules.length===schedulesBefore)return;
saveState();
closeSheet();
render();
}
function submitPlayer(e,id){
e.preventDefault();
const fd=new FormData(e.target);
const gender=fd.get('gender')||'남성';
const data={
name:fd.get('name').trim(),
phone:phone(fd.get('phone')),
parent_phone:phone(fd.get('parent_phone')||''),
gender,
birth_year:Number(fd.get('birth_year')),
affiliation:(fd.get('affiliation')||'').trim(),
memo:(fd.get('memo')||'').trim()
};
if(id){const p=getPlayer(id);Object.assign(p,data);delete p.birth_date;}
else state.players.push({id:uid('p'),...data,payment_history:[],used_sessions:0});
saveState();closeSheet();render();
}
function submitPayment(e,pid){e.preventDefault();const p=getPlayer(pid);if(!p)return;const fd=new FormData(e.target);
if(!p.payment_history)p.payment_history=[];
p.payment_history.push({date:fd.get('date'),amount:Number(fd.get('amount')),sessions:Number(fd.get('sessions'))});
saveState();
render();
detailTab='payment';
renderDetail(pid);
}
function submitSchedule(e,id){
e.preventDefault();
const fd=new FormData(e.target);
const data={date:fd.get('date'),time:String(fd.get('time')).slice(0,5),player_id:fd.get('player_id')};
if(id){
const s=state.schedules.find(x=>x.id===id);
if(!s||s.status!=='scheduled')return;
Object.assign(s,data);
}else{
state.schedules.push({id:uid('s'),...data,status:'scheduled'});
}
selectedDate=data.date;
saveState();closeSheet();setView('calendar');
}

window.setView=setView;window.openSheet=openSheet;window.closeSheet=closeSheet;
window.completeLesson=completeLesson;window.cancelSchedule=cancelSchedule;window.deletePlayer=deletePlayer;
window.submitPlayer=submitPlayer;window.submitPayment=submitPayment;window.submitSchedule=submitSchedule;
window.setCalMode=setCalMode;window.calNav=calNav;window.selectCalDay=selectCalDay;window.setDetailTab=setDetailTab;

document.getElementById('confirmCancel').onclick=()=>closeConfirm(false);
document.getElementById('confirmOk').onclick=()=>closeConfirm(true);
document.getElementById('confirmBackdrop').onclick=e=>{if(e.target.id==='confirmBackdrop')closeConfirm(false);};
document.getElementById('confirmDialog').onclick=e=>e.stopPropagation();

function hideAppSplash(){
const el=document.getElementById('appSplash');
if(!el)return;
el.classList.add('is-hidden');
el.setAttribute('aria-hidden','true');
document.body.classList.remove('app-boot');
setTimeout(()=>el.remove(),450);
}
const splashStarted=performance.now();
loadState();selectedDate=todayISO();setView('home');
setTimeout(hideAppSplash,Math.max(0,650-(performance.now()-splashStarted)));
</script>
